<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>◯✕クイズアプリ</title>
</head>
<body>
    <header>
        <h1>◯✕クイズアプリ</h1>
        <p>次の文章が正しいときは「◯」、誤っているときは「✕」を押してください。</p>
    </header>
    <main>
        <h1 id="question-number">問題1</h1>
        <p id="score-display">正解数: 0</p>
        <section class="question" id="question"></section>
        <button class="true" id="btnTrue">◯</button>
        <button class="false" id="btnFalse">✕</button>
        <div id="result">結果が表示されます</div>
    </main>
    <script src="script.js"></script>
</body>
</html>
