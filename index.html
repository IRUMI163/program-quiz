<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROGRAM QUIZ - Professional Peak Edition</title>
    <!-- Favicon (Inline SVG) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%2370D6FF'/%3E%3Cstop offset='100%25' stop-color='%23FF70A6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ctext x='32' y='46' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='900' font-size='36' fill='white'%3EQ%3C/text%3E%3C/svg%3E">
    <!-- Preload resources for zero-latency start -->    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=v21">

    <!-- OGP (SNSシェア時のカード表示用) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://your-quiz-app.com/">
    <meta property="og:title" content="PROGRAM QUIZ - Professional Peak Edition">
    <meta property="og:description" content="Glassmorphism Programming Quiz. 限界までチューニングされたプログラミングクイズに挑戦！">
    
    <!-- iOS PWA 設定 -->
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <!-- X (Twitter) カード設定 -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="PROGRAM QUIZ">
    <meta name="twitter:description" content="Glassmorphism Programming Quiz">
    <meta name="twitter:image" content="https://your-quiz-app.com/og-image.png">
    <script src="js/confetti.js?v=v21"></script>
    <script src="js/components.js?v=v21" type="module"></script>
    <script src="js/app.js?v=v21" type="module" defer></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // クエリパラメータを付けてブラウザキャッシュをバイパス
                navigator.serviceWorker.register('./sw.js?v=v21', { updateViaCache: 'none' })
                    .then(reg => {
                        reg.update();
                    })
                    .catch(err => console.error('SW register failed:', err));
            });

            // 新しいService Workerが有効になったら自動リロードして最新版を適用
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing) return;
                refreshing = true;
                window.location.reload();
            });
        }
    </script>
</head>

<body>
    <answer-feedback id="flash-overlay" aria-hidden="true"></answer-feedback>
    <div id="toast-container"></div>
    <div class="background-overlay"></div>

    <header class="site-header">
        <div class="header-content">
            <a id="logo-home" href="#" class="logo-text">PROGRAM QUIZ</a>
            <div class="flex gap-8">
                <button id="btn-settings" class="btn-icon" aria-label="Settings">
                    <svg viewBox="0 0 24 24" class="svg-icon">
                        <path
                            d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z" />
                    </svg>
                </button>
                <button id="btn-mute" class="btn-icon" aria-label="Mute Toggle">
                    <svg id="icon-mute" viewBox="0 0 24 24" class="svg-icon">
                        <path
                            d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" />
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <div id="announcer" class="sr-only" aria-live="polite"></div>

    <main class="app-container">
        <div id="start-screen" class="screen">
            <div class="glass-effect">
                <h1 class="hero-title">Program<br><span class="accent-text">QUIZ</span></h1>
                <select id="category-select" class="select-box" aria-label="Category">
                    <option value="javascript">JavaScript</option>
                    <option value="css">CSS</option>
                    <option value="html">HTML</option>
                    <option value="python">Python</option>
                    <option value="typescript">TypeScript</option>
                    <option value="react">React</option>
                    <option value="git">Git</option>
                    <option value="linux">Linux</option>
                    <option value="network">Network</option>
                    <option value="sql">SQL</option>
                    <option value="security">Security</option>
                    <option value="algorithm">Algorithm</option>
                </select>
                <select id="difficulty-select" class="select-box" aria-label="Difficulty">
                    <option value="1" data-i18n="lv1">Lv.1 Beginner</option>
                    <option value="2" data-i18n="lv2">Lv.2 Easy</option>
                    <option value="3" data-i18n="lv3">Lv.3 Normal</option>
                    <option value="4" data-i18n="lv4">Lv.4 Hard</option>
                    <option value="5" data-i18n="lv5">Lv.5 Maniac</option>
                </select>
                <button id="btn-start" class="btn btn-primary" data-i18n="start-btn">GAME START</button>
                <button id="btn-view-ranking" class="btn btn-ghost" data-i18n="view-ranking-btn">View Ranking</button>
            </div>
        </div>

        <div id="quiz-screen" class="screen hidden">
            <div id="progress-container" class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div class="flex-between mb-16 font-bold text-sm">
                <span id="question-count">Q: 1/10</span>
                <span id="combo-display" class="combo-text hidden"></span>
                <span><span data-i18n="score-label">Score</span>: <span id="score-display">0</span></span>
            </div>
            <div id="quiz-card" class="quiz-card glass-effect">
                <quiz-timer id="quiz-timer" value="10" duration="10"></quiz-timer>
                <h2 id="question-text" class="m-0 text-center" style="font-size: 1.1rem; line-height:1.5;" data-i18n="ready-text">Ready?</h2>
            </div>
            <div class="flex gap-16">
                <button id="btn-true" class="btn btn-true" aria-label="True">◯</button>
                <button id="btn-false" class="btn btn-false" aria-label="False">✕</button>
            </div>
        </div>

        <div id="result-screen" class="screen hidden">
            <div class="glass-effect text-center">
                <h1 class="m-0" data-i18n="result-title">Result</h1>
                <p class="text-lg mt-16 mb-0"><span data-i18n="score-label">Score</span>: <span id="final-score" class="font-black color-primary">0</span></p>
                <p class="text-md mb-8"><span data-i18n="correct-label">Correct</span>: <span id="correct-count" class="font-bold">0</span>/10</p>
                <p class="text-sm color-sub mb-16"><span data-i18n="high-score-label">High Score</span>: <span id="high-score-display">0</span></p>
                

                <form id="ranking-form">
                    <input type="text" id="player-name" class="select-box" placeholder="Your Name" data-i18n-placeholder="player-name-placeholder" maxlength="10" required>
                    <button type="submit" id="btn-submit-score" class="btn btn-primary" data-i18n="submit-score-btn">Submit to Ranking</button>
                </form>
                <div id="ranking-board" class="ranking-board hidden">
                    <h3 class="text-sm mt-0" data-i18n="ranking-title">World Ranking</h3>
                    <div id="your-rank-display" class="text-sm mb-16 color-primary font-bold"></div>
                    <ranking-list id="ranking-list" class="ranking-list scroll-y" style="max-height:150px; display:block;"></ranking-list>
                </div>
                <div id="review-list" class="review-list scroll-y text-xs"></div>
                <button id="btn-retry" class="btn btn-primary" data-i18n="retry-btn">Retry</button>
            </div>
        </div>
    </main>

    <!-- Native Dialogs -->
    <dialog id="settings-modal">
        <div class="glass-effect modal-content text-center">
            <h2 class="mt-0" data-i18n="settings-title">Settings</h2>
            <div class="text-left mb-16">
                <label class="text-sm color-sub" data-i18n="lang-label">Language</label>
                <select id="lang-select" class="select-box">
                    <option value="ja">日本語</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div class="text-left mb-16">
                <label class="text-sm color-sub" data-i18n="option-label">Option</label>
                <label class="flex gap-8 mt-16" style="align-items:center; cursor:pointer;">
                    <input type="checkbox" id="quick-mode-check" style="width:18px; height:18px; cursor:pointer;">
                    <span class="text-sm" data-i18n="quick-mode-label">Quick Mode (No Delay)</span>
                </label>
            </div>
            <button id="btn-close-settings" class="btn btn-primary" data-i18n="close-btn">Close</button>
        </div>
    </dialog>

    <dialog id="standalone-ranking-modal">
        <div class="glass-effect modal-content large">
            <h2 class="mt-0" data-i18n="ranking-title">World Ranking</h2>
            
            <div class="flex-between mb-16 gap-16" style="flex-wrap: wrap;">
                <div class="w-full text-left" style="flex:1; min-width:120px;">
                    <label class="text-sm color-sub" data-i18n="diff-label">Difficulty</label>
                    <select id="ranking-diff-select" class="select-box m-0">
                        <option value="all" data-i18n="overall-label">Overall</option>
                        <option value="1" data-i18n="lv1">Lv.1 Beginner</option>
                        <option value="2" data-i18n="lv2">Lv.2 Easy</option>
                        <option value="3" data-i18n="lv3">Lv.3 Normal</option>
                        <option value="4" data-i18n="lv4">Lv.4 Hard</option>
                        <option value="5" data-i18n="lv5">Lv.5 Maniac</option>
                    </select>
                </div>
                <div class="w-full text-left" style="flex:1; min-width:120px;">
                    <label class="text-sm color-sub" data-i18n="category-label">Category</label>
                    <select id="ranking-cat-select" class="select-box m-0">
                        <option value="all" data-i18n="overall-label">Overall</option>
                        <option value="javascript">JavaScript</option>
                        <option value="css">CSS</option>
                        <option value="html">HTML</option>
                        <option value="python">Python</option>
                        <option value="typescript">TypeScript</option>
                        <option value="react">React</option>
                        <option value="git">Git</option>
                        <option value="linux">Linux</option>
                        <option value="network">Network</option>
                        <option value="sql">SQL</option>
                        <option value="security">Security</option>
                        <option value="algorithm">Algorithm</option>
                    </select>
                </div>
            </div>

            <div id="standalone-your-rank" class="your-rank-box text-sm hidden">
                <span data-i18n="your-rank-label">Your Rank</span>: <span id="my-rank-val">-</span>
            </div>

            <div class="scroll-y mb-16 border-top" style="flex:1; padding:1rem 0;">
                <ranking-list id="standalone-ranking-list" class="ranking-list" style="background:transparent; margin:0; display:block;"></ranking-list>
            </div>
            
            <button id="btn-close-ranking" class="btn btn-primary" data-i18n="close-btn">Close</button>
        </div>
    </dialog>
    <footer class="site-footer">
        Developed by <a href="https://irumi-portfolio.vercel.app/" target="_blank" rel="noopener noreferrer" class="footer-link">IRUMI</a>
    </footer>
</body>

</html>
